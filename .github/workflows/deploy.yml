name: SmartCode CRM CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: smartcode-crm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Laravel checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, pdo, sqlite, pdo_sqlite, mysql, pdo_mysql, pgsql, pdo_pgsql, zip, bcmath
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel test environment
        run: |
          cp .env.example .env
          php artisan key:generate --force
          mkdir -p database
          touch database/database.sqlite
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=${{ github.workspace }}/backend/database/database.sqlite" >> .env
          echo "CACHE_STORE=array" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "MAIL_MAILER=array" >> .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: vendor/bin/phpunit --colors=always

  frontend:
    name: Frontend React checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:8000' }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID || '' }}

  deploy-render:
    name: Deploy to Render hooks
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    env:
      RENDER_BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
      RENDER_FRONTEND_DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
    steps:
      - name: Trigger backend deploy hook
        if: env.RENDER_BACKEND_DEPLOY_HOOK != ''
        run: curl -fsSL -X POST "$RENDER_BACKEND_DEPLOY_HOOK"

      - name: Trigger frontend deploy hook
        if: env.RENDER_FRONTEND_DEPLOY_HOOK != ''
        run: curl -fsSL -X POST "$RENDER_FRONTEND_DEPLOY_HOOK"

      - name: Deployment hooks not configured
        if: env.RENDER_BACKEND_DEPLOY_HOOK == '' && env.RENDER_FRONTEND_DEPLOY_HOOK == ''
        run: echo "No Render deploy hook secrets configured; CI completed without deployment."
  deploy-vps:
    name: Deploy to VPS over SSH
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && vars.ENABLE_VPS_DEPLOY == 'true'
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER || 'root' }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR || '/opt/smartcode-crm' }}
      VPS_REPO_URL: ${{ secrets.VPS_REPO_URL || format('{0}/{1}.git', github.server_url, github.repository) }}
    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "APP_DIR='$VPS_APP_DIR' REPO_URL='$VPS_REPO_URL' bash -s" <<'EOF'
          set -euo pipefail
          mkdir -p "$APP_DIR"
          if [ ! -d "$APP_DIR/.git" ]; then
            git clone "$REPO_URL" "$APP_DIR"
          fi
          cd "$APP_DIR"
          git fetch --all --prune
          git reset --hard origin/main
          if [ ! -f deploy/vps/.env ]; then
            cp deploy/vps/.env.example deploy/vps/.env
            echo "Created deploy/vps/.env from example. Fill it on the VPS before the next deployment."
            exit 1
          fi
          docker compose -f deploy/vps/docker-compose.yml --env-file deploy/vps/.env up -d --build
          docker image prune -f
          EOF
